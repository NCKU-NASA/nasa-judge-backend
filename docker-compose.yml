version: '3.3'

services:
  mysql:
    image: mysql
    container_name: mysql
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: examplepasswd
      MYSQL_DATABASE: nasa
      MYSQL_USER: nasa-admin
      MYSQL_PASSWORD: examplepasswd
  app:
    restart: always
    container_name: app
    build: .
    ports:
        - 3000:3000
    depends_on:
      - mysql
