version: 3

services:
  app:
    restart: always
    container_name: app
    build: .
    depends_on:
      - mysql
  mysql:
    image: mysql
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_DATABASE: nasa
      MYSQL_USER: nasa-admin
      MYSQL_PASSWORD: examplepasswd
